name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Find Gradle Wrapper (gradlew)
        id: find_gradlew
        shell: bash
        run: |
          set -e
          GRADLEW_PATH="$(find . -type f -name gradlew -print -quit)"
          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: gradlew not found in repository."
            echo "Make sure you uploaded the Android Studio project including gradlew, gradlew.bat, and gradle/wrapper."
            exit 1
          fi
          echo "Found gradlew at: $GRADLEW_PATH"
          echo "gradlew_path=$GRADLEW_PATH" >> "$GITHUB_OUTPUT"
          echo "gradle_dir=$(dirname "$GRADLEW_PATH")" >> "$GITHUB_OUTPUT"

      - name: Make gradlew executable
        shell: bash
        run: |
          chmod +x "${{ steps.find_gradlew.outputs.gradlew_path }}"

      - name: Build debug APK
        shell: bash
        run: |
          set -e
          cd "${{ steps.find_gradlew.outputs.gradle_dir }}"
          ./gradlew :app:assembleDebug --no-daemon

      - name: Find APK
        id: find_apk
        shell: bash
        run: |
          set -e
          APK_PATH="$(find . -type f -path "*/app/build/outputs/apk/debug/app-debug.apk" -print -quit)"
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: app-debug.apk not found after build."
            echo "Searched for */app/build/outputs/apk/debug/app-debug.apk"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LUMA-Android-APK
          path: ${{ steps.find_apk.outputs.apk_path }}
