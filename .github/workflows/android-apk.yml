name: Build Android APK (no gradlew)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Ставим Gradle 8.2 (подходит под "minimum 8.2")
      - name: Install Gradle 8.2
        shell: bash
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH
          gradle -v

      - name: Find Android project dir
        id: find_project
        shell: bash
        run: |
          set -e
          PROJECT_DIR="$(find . -maxdepth 8 -type f -name settings.gradle -print -quit | xargs -r dirname)"
          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: settings.gradle not found. Upload the Android project folder (with settings.gradle and app/)."
            exit 1
          fi
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Found project dir: $PROJECT_DIR"

      - name: Build debug APK
        shell: bash
        run: |
          set -e
          gradle -p "${{ steps.find_project.outputs.project_dir }}" :app:assembleDebug --no-daemon

      - name: Find APK
        id: find_apk
        shell: bash
        run: |
          set -e
          APK_PATH="$(find "${{ steps.find_project.outputs.project_dir }}" -type f -path "*/app/build/outputs/apk/debug/app-debug.apk" -print -quit)"
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: app-debug.apk not found after build."
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LUMA-Android-APK
          path: ${{ steps.find_apk.outputs.apk_path }}
